name: Docker build

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

on:
  workflow_call:
    inputs:
      file:
        description: "File use to build the docker image"
        default: "Dockerfile"
        type: string
      push:
        description: "Push the docker image to the registry"
        default: false
        type: boolean
      local-artifact-name:
        description: "Name of the artifact used for local builds only"
        default: "docker-image"
        type: string
      local-artifact-dir:
        description: "Directory of the artifact used for local builds only"
        default: "/tmp"
        type: string
    outputs:
      tags:
        description: "Docker tags"
        value: ${{ jobs.docker.outputs.tags }}

jobs:
  docker:
    name: Build${{ inputs.push == true && '-Push' || '' }}
    runs-on: ubuntu-latest-16-cores
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags so `git describe --tags` resolves a real
          # version for the build-args below (default checkout is shallow).
          fetch-depth: 0

      - name: Compute build version
        id: version
        run: |
          echo "describe=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build${{ inputs.push == true && '-Push' || '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          # platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          file: ${{ inputs.file }}
          build-args: |
            AGGLAYER_BUILD_DESCRIBE=${{ steps.version.outputs.describe }}
            AGGLAYER_BUILD_TIMESTAMP=${{ steps.version.outputs.timestamp }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: ${{ inputs.push == true && 'type=image' || format('type=docker,dest={0}/{1}.tar', inputs.local-artifact-dir, inputs.local-artifact-name) }}
          # The buildx cache lives in GHCR instead of the 10GB Actions cache so
          # rust-cache churn from other jobs cannot evict the cargo-chef layers.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-buildcache:main
          # Only builds on the main ref export the cache: pushes to main, and
          # manual dispatches on main (useful to warm or refresh the cache).
          # Merge queue, PR, and branch dispatch builds stay cache-read-only
          # (see PR #1593). Cache export is expensive and blocks the E2E
          # required check.
          cache-to: ${{ inputs.push == true && github.ref == 'refs/heads/main' && format('type=registry,ref={0}/{1}-buildcache:main,mode=max,image-manifest=true', env.REGISTRY, env.IMAGE_NAME) || '' }}

      - name: Upload artifact
        if: inputs.push == false
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.local-artifact-name }}
          path: ${{ inputs.local-artifact-dir }}/${{ inputs.local-artifact-name }}.tar
