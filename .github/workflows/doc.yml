name: Build and host documentation

on:
  merge_group:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

# Default permissions (individual jobs can override as needed)
permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest-16-cores
    if: github.event.action != 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@protoc

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build Knowledge Base
        run: mdbook build docs/knowledge-base/

      - name: Build Documentation
        run: cargo doc --no-deps --all --all-features

      - name: Assemble hosted documentation
        run: |
          mkdir -p host-docs/rustdoc
          cp -r docs/knowledge-base/book/. ./host-docs/
          cp -r target/doc/. ./host-docs/rustdoc/
          echo "<meta http-equiv=\"refresh\" content=\"0; url=agglayer\">" > host-docs/rustdoc/index.html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-docs
          path: "host-docs/"
          retention-days: 7

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !github.event.repository.fork
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v5
        with:
          name: rust-docs
          path: host-docs

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: "host-docs/"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-cloudflare-pages:
    name: Deploy to Cloudflare Pages
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v5
        with:
          name: rust-docs
          path: docs

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          OUTPUT=$(wrangler pages deploy docs --project-name=agglayer-node-docs --branch="${{ github.head_ref }}")
          echo "$OUTPUT"
          DEPLOYMENT_URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.pages\.dev' | tail -1)
          echo "url=${DEPLOYMENT_URL:-https://${{ github.head_ref }}.agglayer-node-docs.pages.dev}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKER_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_WORKER_ACCOUNT_ID }}

      - name: Comment PR with deployment URL
        uses: actions/github-script@v9
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}' || `https://${{ github.head_ref }}.agglayer-node-docs.pages.dev`;
            const deploymentComment = `📖 Documentation deployed to: ${url}`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existingComment = comments.data.find(comment =>
              comment.body.includes('📖 Documentation deployed to:')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: deploymentComment
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: deploymentComment
              });
            }
