name: Test

on:
  push:
    branches:
      - main
  merge_group:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest-16-cores
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: ./.github/actions/unit-test

  isolated-feature-checks:
    name: "Isolated feature checks"
    runs-on: ubuntu-latest-16-cores
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: protoc,cargo-hack
      - run: cargo hack --each-feature --all check --all-targets --locked

  integrations:
    name: Integration tests
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 40
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-make,nextest,protoc,cargo-hack

      - name: Load image
        run: cargo make integration-l1-image

      - name: Set up rust cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Anvil
        uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned so CI's anvil can decode the committed state.json fixture.
          # anvil_dumpState's format is foundry-version-coupled, so this must
          # match the version the fixture was generated with (recorded as
          # `foundry_version` in tests/integrations/fixtures/anvil-l1/metadata.json).
          # To upgrade: bump here, regenerate the fixture with the same version via
          # tests/integrations/scripts/generate_anvil_l1_fixture.sh, and commit both.
          version: "1.7.1"

      - name: Test
        # --retries 2 absorbs transient startup-timeout flakes under parallel
        # load (mirrors the documented local invocation in the README).
        run: cargo nextest run --workspace -P integrations --retries 2

  docker-build-local:
    name: E2E Tests | Docker build
    if: ${{ contains('["merge_group", "workflow_dispatch", "push"]', github.event_name) }}
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    permissions:
      packages: write
    with:
      push: ${{ contains('["workflow_dispatch", "push"]', github.event_name) }}
      local-artifact-name: "docker-image"
      local-artifact-dir: "/tmp"

  call-agglayer-node-e2e-workflow:
    name: E2E Tests | Agglayer Node
    if: ${{ contains('["merge_group", "workflow_dispatch"]', github.event_name) }}
    needs:
      - docker-build-local
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: agglayer/e2e/.github/workflows/agglayer-node-e2e.yml@8763263b4c6bf61fd83d205a6fc0080c6e82b1e4 # 2026-03-20
    secrets: inherit
    with:
      docker-image-override: agglayer_image
      docker-tag: ${{ needs.docker-build-local.outputs.tags }}
      kurtosis-cdk-ref: 6f5c0f0cd2cce5cf11a025aade73b13664df8007 # 2026-03-18
      docker-artifact-name: ${{ github.event_name == 'merge_group' && 'docker-image' || '' }}
      agglayer-e2e-ref: 8763263b4c6bf61fd83d205a6fc0080c6e82b1e4 # 2026-04-27
      kurtosis-cdk-args: |
        {
          "deployment_stages": {
            "deploy_optimism_rollup": true
          },
          "args": {
            "sequencer_type": "op-reth",
            "l1_el_type": "reth",
            "reth_image": "ghcr.io/paradigmxyz/reth:v1.11.3",
            "aggkit_image": "ghcr.io/agglayer/aggkit:0.5.4",
            "consensus_contract_type": "pessimistic",
            "verbosity": "debug"
          }
        }

  # We use this job to check the result of the E2E tests
  # As the E2E are running from a reusable workflow,
  # github doesn't handle the job name when dealing with required jobs.'
  # see: https://github.com/actions/runner/issues/1917
  check-e2e-result:
    name: E2E Tests | Passed
    needs:
      - call-agglayer-node-e2e-workflow
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: ${{ contains(fromJSON('["failure", "cancelled"]'), needs.call-agglayer-node-e2e-workflow.result) }}

  check_elf:
    runs-on: ubuntu-latest-16-cores
    name: ELF Checking
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Define source checksum
        run: |
          echo CHECKSUM="$(sha256sum crates/pessimistic-proof/elf/riscv64im-succinct-zkvm-elf | awk '{ print $1 }')" >> "$GITHUB_ENV"

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up rust cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: taiki-e/install-action@protoc

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: taiki-e/install-action@protoc

      - name: Install cargo-make
        run: cargo install --debug --locked cargo-make

      - name: Build the PP elf
        run: cargo make pp-elf

      - name: ELF is up to date
        run: diff <(sha256sum crates/pessimistic-proof/elf/riscv64im-succinct-zkvm-elf | awk '{ print $1 }') <( echo $CHECKSUM )

      - name: Check vKey
        run: cargo make pp-check-vkey-change
