[test-groups]
resource-limited = { max-threads = 4 }
integration-failpoint = { max-threads = 1 }

[profile.default]
default-filter = "not package(integrations)"

[profile.integrations]
default-filter = "package(integrations)"

# Timeout-heavy L1 settlement failure tests (all share the
# `transaction_with_receipt` prefix) run serially so they don't pile up under CI
# concurrency; everything else runs in the parallel resource-limited group.
[[profile.integrations.overrides]]
filter = 'package(integrations) and test(transaction_with_receipt)'
test-group = 'integration-failpoint'

[[profile.integrations.overrides]]
filter = 'package(integrations) and not test(transaction_with_receipt)'
test-group = 'resource-limited'
