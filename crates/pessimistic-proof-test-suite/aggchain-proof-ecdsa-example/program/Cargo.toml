[workspace]
[package]
version = "0.1.0"
name = "sp1-ecdsa-verification-program"
edition = "2021"

[dependencies]
alloy-primitives = { version = "0.8.15", features = ["serde", "k256"] }
bincode = "1.3.3"
sp1-zkvm = "=4.0.0"
tiny-keccak = { git = "https://github.com/sp1-patches/tiny-keccak", tag = "patch-2.0.2-sp1-4.0.0", features = [
    "keccak",
] }

ecdsa-proof-lib = { path = "../lib/" }

[patch.crates-io.ecdsa-core]
git = "https://github.com/sp1-patches/signatures"
package = "ecdsa"
tag = "ecdsa-v0.16.9-patch-v1"

[patch.crates-io.tiny-keccak]
git = "https://github.com/sp1-patches/tiny-keccak"
tag = "patch-2.0.2-sp1-4.0.0"
