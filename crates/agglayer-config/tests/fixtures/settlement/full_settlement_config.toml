# Full settlement configuration for pessimistic-proof settlement
[pessimistic-proof-tx-config]
max-expected-retries = 2048
retry-on-transient-failure.initial-interval = "15s"
retry-on-transient-failure.multiplier = 2.5
retry-on-transient-failure.max-interval = "2m"
retry-on-transient-failure.jitter = "1m"
confirmations = 64
settlement-policy = "FinalizedBlock"
gas-limit-ceiling = "0x5f5e100"
gas-limit-multiplier-factor = 1.1
max-fee-per-gas-multiplier-factor = 1.2
max-fee-per-gas-ceiling = "200gwei"

[settlement-service-config]
# Currently no service-specific fields

