syntax = "proto3";

package agglayer.storage.v0;

// Proof system that produced the opaque proof bytes.
enum ProofSystem {
  // Default value, should not be used.
  PROOF_SYSTEM_UNSPECIFIED = 0;
  // SP1 proof system.
  PROOF_SYSTEM_SP1 = 1;
}

// Mode of the SP1 proof.
enum ProofMode {
  // Default value, should not be used.
  PROOF_MODE_UNSPECIFIED = 0;
  // Compressed (STARK) SP1 proof.
  PROOF_MODE_COMPRESSED = 1;
  // Plonk SNARK wrapper over an SP1 proof.
  PROOF_MODE_PLONK = 2;
  // Groth16 SNARK wrapper over an SP1 proof.
  PROOF_MODE_GROTH16 = 3;
}

// SDK-agnostic envelope for a zero-knowledge proof.
// The bytes fields stay opaque so the stored wire format does not depend on
// SDK-specific Rust types.
message Proof {
  // Which proof system produced this proof.
  ProofSystem proof_system = 1;

  // Preserved end to end as reported by the producing SDK.
  string version = 2;

  // Proof mode inside the selected proof system.
  ProofMode mode = 3;

  // Opaque serialized proof payload.
  bytes proof = 4;

  // Opaque serialized public values.
  bytes public_values = 5;

  // Opaque serialized verifying key.
  bytes vkey = 6;
}
